name: "Build and publish site"

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: "ubuntu-latest"
    steps:
      - name: "Check out repository"
        uses: "actions/checkout@v7"

      - name: "Set up Quarto"
        uses: "quarto-dev/quarto-actions/setup@v2"

      - name: "Install needed Quarto extensions"
        run: "quarto install extension --no-prompt schochastics/academicons"

      - name: "Render"
        run: "quarto render"

      - name: "Upload artifact"
        uses: "actions/upload-pages-artifact@v5"
        with:
          path: "_site"
  deploy:
    needs: build
    runs-on: "ubuntu-latest"
    steps:
        - name: "Deploy to GitHub pages"
          uses: "actions/deploy-pages@v5"
          with:
            token: ${{ secrets.GITHUB_TOKEN }}
